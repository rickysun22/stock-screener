<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>选股小工具 v4.0 - A股智能选股</title>
    <style>
        :root {
            --bg: #0d1117;
            --bg-secondary: #111318;
            --card: #161b22;
            --card-hover: #1c2128;
            --border: #30363d;
            --text: #e6e6e6;
            --text-secondary: #8b949e;
            --accent-up: #ff4d4d;
            --accent-down: #4ade80;
            --accent: #58a6ff;
            --accent-hover: #79b8ff;
            --radius: 8px;
            --radius-sm: 6px;
            --shadow: 0 1px 3px rgba(0,0,0,0.4);
            --shadow-lg: 0 8px 24px rgba(0,0,0,0.5);
            --font: system-ui, -apple-system, "Segoe UI", "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; }
        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            font-size: 14px;
            line-height: 1.5;
            overflow-x: hidden;
        }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #484f58; }

        /* Top Navigation */
        .navbar {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(13,17,23,0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 0 24px;
        }
        .navbar-inner {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 56px;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 18px;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.3px;
        }
        .logo-icon {
            width: 32px; height: 32px;
            background: linear-gradient(135deg, var(--accent-up), #ff8f8f);
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; font-weight: 700; color: #fff;
        }
        .logo small { font-size: 12px; color: var(--text-secondary); font-weight: 400; margin-left: 4px; }
        .nav-tabs {
            display: flex; gap: 4px;
        }
        .nav-tab {
            padding: 8px 16px;
            border: none; border-radius: var(--radius-sm);
            background: transparent;
            color: var(--text-secondary);
            font-size: 14px; font-weight: 500;
            cursor: pointer; transition: all 0.2s ease;
            font-family: inherit;
        }
        .nav-tab:hover { color: var(--text); background: rgba(255,255,255,0.04); }
        .nav-tab.active { color: var(--accent); background: rgba(88,166,255,0.1); }
        .nav-status {
            display: flex; align-items: center; gap: 8px;
            font-size: 12px; color: var(--text-secondary);
        }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent-down); transition: background 0.3s; }
        .status-dot.loading { background: #f0b429; animation: pulse 1s infinite; }
        .status-dot.error { background: var(--accent-up); }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

        /* Main Layout */
        .main {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px 24px 40px;
            min-height: calc(100vh - 56px);
        }
        .panel { display: none; }
        .panel.active { display: block; animation: fadeIn 0.25s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

        /* Cards */
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            transition: border-color 0.2s, transform 0.2s;
        }
        .card:hover { border-color: #484f58; }
        .card-title {
            font-size: 15px; font-weight: 600;
            margin-bottom: 16px;
            color: var(--text);
            display: flex; align-items: center; justify-content: space-between;
        }
        .card-title .sub { font-size: 12px; font-weight: 400; color: var(--text-secondary); }

        /* Grid layouts */
        .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
        .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
        @media (max-width: 1024px) { .grid-4 { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 768px) { .grid-4, .grid-3, .grid-2 { grid-template-columns: 1fr; } }

        /* Index cards */
        .index-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px 24px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .index-card:hover { border-color: var(--accent); transform: translateY(-2px); }
        .index-card .name { font-size: 13px; color: var(--text-secondary); margin-bottom: 6px; }
        .index-card .price { font-size: 28px; font-weight: 700; font-family: "SF Mono", SFMono-Regular, Consolas, monospace; }
        .index-card .change-row { display: flex; align-items: center; gap: 8px; margin-top: 6px; font-size: 13px; }
        .up { color: var(--accent-up); }
        .down { color: var(--accent-down); }
        .neutral { color: var(--text-secondary); }

        /* Sentiment bar */
        .sentiment-bar {
            height: 8px; border-radius: 4px;
            display: flex; overflow: hidden; margin-top: 12px;
        }
        .sentiment-bar .up-bar { background: var(--accent-up); }
        .sentiment-bar .down-bar { background: var(--accent-down); }
        .sentiment-bar .flat-bar { background: #484f58; }
        .sentiment-legend {
            display: flex; gap: 20px; margin-top: 10px;
            font-size: 13px; color: var(--text-secondary);
        }
        .sentiment-legend span { display: flex; align-items: center; gap: 6px; }
        .sentiment-legend .dot { width: 8px; height: 8px; border-radius: 50%; }

        /* Heatmap */
        .heatmap-toolbar {
            display: flex; gap: 12px; margin-bottom: 16px; align-items: center; flex-wrap: wrap;
        }
        .heatmap-btn {
            padding: 6px 14px; border: 1px solid var(--border); border-radius: var(--radius-sm);
            background: var(--card); color: var(--text-secondary); font-size: 13px;
            cursor: pointer; transition: all 0.2s; font-family: inherit;
        }
        .heatmap-btn:hover { border-color: var(--accent); color: var(--text); }
        .heatmap-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(88,166,255,0.08); }
        .heatmap-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 6px;
            min-height: 200px;
        }
        .heatmap-cell {
            border-radius: var(--radius-sm);
            padding: 12px 8px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.15s, filter 0.15s;
            position: relative;
            overflow: hidden;
        }
        .heatmap-cell:hover { transform: scale(1.04); z-index: 2; filter: brightness(1.15); }
        .heatmap-cell .hm-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .heatmap-cell .hm-change { font-size: 15px; font-weight: 700; margin-top: 4px; font-family: monospace; }
        .heatmap-cell .hm-mv { font-size: 11px; opacity: 0.8; margin-top: 2px; }
        .heatmap-loading { grid-column: 1 / -1; text-align: center; padding: 60px; color: var(--text-secondary); }

        /* Screening layout */
        .screen-layout { display: flex; gap: 20px; }
        .screen-sidebar { width: 300px; flex-shrink: 0; }
        .screen-content { flex: 1; min-width: 0; }
        @media (max-width: 1024px) { .screen-layout { flex-direction: column; } .screen-sidebar { width: 100%; } }

        .filter-group { margin-bottom: 18px; }
        .filter-group-title {
            font-size: 13px; font-weight: 600; color: var(--text);
            margin-bottom: 10px; padding-bottom: 6px;
            border-bottom: 1px solid var(--border);
        }
        .form-row { display: flex; gap: 10px; }
        .form-row > * { flex: 1; }
        .form-label {
            display: block; font-size: 12px; color: var(--text-secondary);
            margin-bottom: 4px; font-weight: 500;
        }
        .form-input, .form-select {
            width: 100%; padding: 7px 10px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text); font-size: 13px;
            font-family: inherit; transition: border-color 0.2s;
        }
        .form-input:focus, .form-select:focus {
            outline: none; border-color: var(--accent);
        }
        .form-select { cursor: pointer; }
        .checkbox-row { display: flex; gap: 16px; flex-wrap: wrap; margin-top: 4px; }
        .checkbox-row label { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text-secondary); cursor: pointer; }
        .checkbox-row input[type="checkbox"] { width: 15px; height: 15px; accent-color: var(--accent); cursor: pointer; }

        .preset-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; margin-bottom: 14px; }
        .preset-btn {
            padding: 7px 6px; border: 1px solid var(--border); border-radius: var(--radius-sm);
            background: var(--bg-secondary); color: var(--text-secondary); font-size: 12px;
            cursor: pointer; transition: all 0.2s; text-align: center; font-family: inherit;
        }
        .preset-btn:hover { border-color: var(--accent); color: var(--accent); }
        .preset-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

        .btn {
            padding: 9px 16px; border: none; border-radius: var(--radius-sm);
            font-size: 14px; font-weight: 500; cursor: pointer;
            transition: all 0.2s; font-family: inherit; display: inline-flex; align-items: center; justify-content: center; gap: 6px;
        }
        .btn-primary { background: var(--accent); color: #fff; }
        .btn-primary:hover { background: var(--accent-hover); }
        .btn-secondary { background: var(--border); color: var(--text); }
        .btn-secondary:hover { background: #484f58; }
        .btn-danger { background: rgba(255,77,77,0.15); color: var(--accent-up); border: 1px solid rgba(255,77,77,0.3); }
        .btn-danger:hover { background: rgba(255,77,77,0.25); }
        .btn-block { width: 100%; }
        .btn-sm { padding: 5px 10px; font-size: 12px; }

        /* Table */
        .table-wrap { overflow-x: auto; border: 1px solid var(--border); border-radius: var(--radius); }
        .data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .data-table th {
            background: var(--bg-secondary); padding: 10px 12px;
            text-align: left; font-weight: 600; color: var(--text-secondary);
            font-size: 12px; white-space: nowrap; cursor: pointer; user-select: none;
            border-bottom: 1px solid var(--border);
        }
        .data-table th:hover { color: var(--accent); }
        .data-table th .sort-icon { font-size: 10px; margin-left: 4px; opacity: 0.5; }
        .data-table td {
            padding: 10px 12px; border-bottom: 1px solid var(--border);
            white-space: nowrap; color: var(--text);
        }
        .data-table tr:hover td { background: rgba(255,255,255,0.02); }
        .data-table .code { font-family: monospace; font-size: 12px; color: var(--accent); }
        .data-table .name { font-weight: 500; }
        .data-table .num { font-family: monospace; font-size: 12.5px; }
        .data-table .score { font-weight: 700; color: var(--accent); }
        .data-table .rating { font-size: 11px; letter-spacing: 1px; }

        /* Toolbar */
        .toolbar {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 12px; flex-wrap: wrap; gap: 10px;
        }
        .toolbar .info { font-size: 13px; color: var(--text-secondary); }
        .toolbar .info strong { color: var(--accent); font-size: 15px; }

        /* Loading overlay */
        .loading-overlay {
            position: fixed; inset: 0; background: rgba(13,17,23,0.92);
            display: none; justify-content: center; align-items: center; flex-direction: column;
            z-index: 2000; backdrop-filter: blur(6px);
        }
        .loading-overlay.active { display: flex; }
        .spinner {
            width: 40px; height: 40px;
            border: 3px solid var(--border); border-top-color: var(--accent);
            border-radius: 50%; animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { margin-top: 14px; font-size: 14px; color: var(--text-secondary); }
        .loading-bar { width: 180px; height: 3px; background: var(--border); border-radius: 2px; margin-top: 10px; overflow: hidden; }
        .loading-bar-inner { height: 100%; background: var(--accent); width: 0%; transition: width 0.3s; }

        /* Empty state */
        .empty-state { text-align: center; padding: 60px 20px; color: var(--text-secondary); }
        .empty-state .big-icon { font-size: 40px; margin-bottom: 12px; opacity: 0.6; }
        .empty-state p { font-size: 14px; }

        /* Fund flow cards */
        .flow-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
        .flow-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .flow-header h4 { font-size: 14px; font-weight: 600; }
        .flow-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.04);
        }
        .flow-item:last-child { border-bottom: none; }
        .flow-item .left { display: flex; align-items: center; gap: 10px; }
        .flow-item .rank { font-size: 12px; font-weight: 700; color: var(--text-secondary); width: 20px; text-align: center; }
        .flow-item .rank.top { color: var(--accent-up); }
        .flow-item .info .name { font-size: 13px; font-weight: 500; }
        .flow-item .info .meta { font-size: 11px; color: var(--text-secondary); margin-top: 1px; }
        .flow-item .right { text-align: right; }
        .flow-item .right .val { font-size: 13px; font-weight: 600; font-family: monospace; }
        .flow-item .right .pct { font-size: 11px; margin-top: 1px; }

        /* Backtest */
        .backtest-inputs { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 16px; }
        @media (max-width: 1024px) { .backtest-inputs { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 640px) { .backtest-inputs { grid-template-columns: 1fr; } }
        .metrics-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; margin-bottom: 20px; }
        @media (max-width: 768px) { .metrics-row { grid-template-columns: repeat(2, 1fr); } }
        .metric-box {
            background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
            padding: 16px; text-align: center;
        }
        .metric-box .val { font-size: 22px; font-weight: 700; font-family: monospace; }
        .metric-box .lbl { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }

        /* Chart placeholder area */
        .chart-area { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; height: 300px; position: relative; }

        /* Toast */
        .toast {
            position: fixed; bottom: 24px; right: 24px;
            background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
            padding: 12px 20px; font-size: 13px; color: var(--text);
            box-shadow: var(--shadow-lg); z-index: 3000;
            transform: translateY(100px); opacity: 0; transition: all 0.3s ease;
        }
        .toast.show { transform: translateY(0); opacity: 1; }
        .toast.error { border-color: var(--accent-up); }

        /* Tooltip */
        [data-tip] { position: relative; }
        [data-tip]::after {
            content: attr(data-tip); position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%);
            background: #1f242c; border: 1px solid var(--border); border-radius: 4px;
            padding: 4px 8px; font-size: 11px; color: var(--text); white-space: nowrap;
            opacity: 0; pointer-events: none; transition: opacity 0.2s; margin-bottom: 6px;
            z-index: 50;
        }
        [data-tip]:hover::after { opacity: 1; }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="navbar-inner">
        <div class="logo">
            <div class="logo-icon">V4</div>
            <span>选股小工具 <small>v4.0</small></span>
        </div>
        <div class="nav-tabs">
            <button class="nav-tab active" data-panel="dashboard" onclick="App.switchPanel('dashboard')">大盘概览</button>
            <button class="nav-tab" data-panel="heatmap" onclick="App.switchPanel('heatmap')">板块热力</button>
            <button class="nav-tab" data-panel="screen" onclick="App.switchPanel('screen')">智能选股</button>
            <button class="nav-tab" data-panel="fundflow" onclick="App.switchPanel('fundflow')">资金流向</button>
            <button class="nav-tab" data-panel="backtest" onclick="App.switchPanel('backtest')">回测分析</button>
        </div>
        <div class="nav-status">
            <span class="status-dot" id="statusDot"></span>
            <span id="statusText">就绪</span>
        </div>
    </div>
</nav>

<main class="main">

<!-- ========== 大盘概览 ========== -->
<section class="panel active" id="panel-dashboard">
    <div class="grid-4" id="indexCards">
        <div class="index-card"><div class="empty-state" style="padding:20px"><div class="spinner" style="width:24px;height:24px;border-width:2px"></div></div></div>
        <div class="index-card"><div class="empty-state" style="padding:20px"><div class="spinner" style="width:24px;height:24px;border-width:2px"></div></div></div>
        <div class="index-card"><div class="empty-state" style="padding:20px"><div class="spinner" style="width:24px;height:24px;border-width:2px"></div></div></div>
        <div class="index-card"><div class="empty-state" style="padding:20px"><div class="spinner" style="width:24px;height:24px;border-width:2px"></div></div></div>
    </div>

    <div class="grid-2" style="margin-top: 20px;">
        <div class="card">
            <div class="card-title">市场情绪 <span class="sub">全市场涨跌分布</span></div>
            <div id="sentimentContent">
                <div class="empty-state"><div class="spinner" style="width:24px;height:24px;border-width:2px"></div></div>
            </div>
        </div>
        <div class="card">
            <div class="card-title">成交额 <span class="sub">沪深两市总成交额</span></div>
            <div id="volumeContent">
                <div class="empty-state"><div class="spinner" style="width:24px;height:24px;border-width:2px"></div></div>
            </div>
        </div>
    </div>
</section>

<!-- ========== 板块热力 ========== -->
<section class="panel" id="panel-heatmap">
    <div class="card">
        <div class="card-title">
            <span>板块热力图</span>
            <div class="heatmap-toolbar" style="margin:0">
                <button class="heatmap-btn active" onclick="Heatmap.switchType('industry')" id="btn-industry">行业板块</button>
                <button class="heatmap-btn" onclick="Heatmap.switchType('concept')" id="btn-concept">概念板块</button>
                <span style="margin-left:auto;font-size:12px;color:var(--text-secondary)">红涨绿跌，块大小代表市值权重</span>
            </div>
        </div>
        <div class="heatmap-container" id="heatmapContainer">
            <div class="heatmap-loading">加载中...</div>
        </div>
    </div>
</section>

<!-- ========== 智能选股 ========== -->
<section class="panel" id="panel-screen">
    <div class="screen-layout">
        <aside class="screen-sidebar">
            <div class="card" style="padding:16px">
                <div class="preset-grid" style="margin-bottom:10px">
                    <button class="preset-btn active" data-preset="custom" onclick="Screen.applyPreset('custom')">自定义</button>
                    <button class="preset-btn" data-preset="value" onclick="Screen.applyPreset('value')">价值精选</button>
                    <button class="preset-btn" data-preset="growth" onclick="Screen.applyPreset('growth')">成长猎手</button>
                    <button class="preset-btn" data-preset="bluechip" onclick="Screen.applyPreset('bluechip')">低估蓝筹</button>
                    <button class="preset-btn" data-preset="smallcap" onclick="Screen.applyPreset('smallcap')">小盘成长</button>
                    <button class="preset-btn" data-preset="trend" onclick="Screen.applyPreset('trend')">趋势突破</button>
                    <button class="preset-btn" data-preset="oversold" onclick="Screen.applyPreset('oversold')">超跌反弹</button>
                    <button class="preset-btn" data-preset="dividend" onclick="Screen.applyPreset('dividend')">高股息</button>
                    <button class="preset-btn" data-preset="highbonus" onclick="Screen.applyPreset('highbonus')">高分红</button>
                    <button class="preset-btn" data-preset="cashflow" onclick="Screen.applyPreset('cashflow')">现金流充裕</button>
                    <button class="preset-btn" data-preset="institution" onclick="Screen.applyPreset('institution')">机构重仓</button>
                    <button class="preset-btn" data-preset="reset" onclick="Screen.reset()" style="border-color:var(--accent-up);color:var(--accent-up)">重置</button>
                </div>

                <div class="filter-group">
                    <div class="filter-group-title">市值分类</div>
                    <div class="checkbox-row">
                        <label><input type="checkbox" id="sc-large" checked> 大盘(>1000亿)</label>
                        <label><input type="checkbox" id="sc-mid" checked> 中盘(100-1000亿)</label>
                        <label><input type="checkbox" id="sc-small" checked> 小盘(<100亿)</label>
                    </div>
                </div>

                <div class="filter-group">
                    <div class="filter-group-title">基本面指标</div>
                    <div class="form-row">
                        <div><label class="form-label">PE 最小</label><input type="number" class="form-input" id="f-peMin" value="0" step="1"></div>
                        <div><label class="form-label">PE 最大</label><input type="number" class="form-input" id="f-peMax" value="50" step="1"></div>
                    </div>
                    <div class="form-row" style="margin-top:8px">
                        <div><label class="form-label">PB 最小</label><input type="number" class="form-input" id="f-pbMin" value="" step="0.1"></div>
                        <div><label class="form-label">PB 最大</label><input type="number" class="form-input" id="f-pbMax" value="3" step="0.1"></div>
                    </div>
                    <div class="form-row" style="margin-top:8px">

<script>
// ============================
//  App Config & Utilities
// ============================
const App = {
    currentPanel: 'dashboard',
    allStocks: [],
    sectorMap: {}, // code -> sector name

    concepts: [],

    switchPanel(name) {
        this.currentPanel = name;

        document.querySelectorAll('.panel').forEach(p => p.classList.toggle('active', p.id === 'panel-' + name));

        if (name === 'fundflow' && !FundFlow.loaded) FundFlow.load();
        if (name === 'dashboard' && this.allStocks.length === 0) Dashboard.load();
    },

    async init() {
        const today = new Date();
        document.getElementById('bt-end').value = today.toISOString().split('T')[0];
        document.getElementById('bt-start').value = new Date(today.getFullYear()-1, today.getMonth(), today.getDate()).toISOString().split('T')[0];
        await Dashboard.load();
    },

    showToast(msg, isError) {
        const t = document.getElementById('toast');

        t.className = 'toast' + (isError ? ' error' : '') + ' show';

    loading(show, text, pct) {
        const el = document.getElementById('loadingOverlay');
        if (!show) { el.classList.remove('active'); return; }

    updateStatus(text, type) {
        const dot = document.getElementById('statusDot');
        const txt = document.getElementById('statusText');
        txt.textContent = text;
        dot.className = 'status-dot' + (type ? ' ' + type : '');
    },

    sleep(ms) { return new Promise(r => setTimeout(r, ms)); },

    fmtNum(v, digits=2) {
        if (v === undefined || v === null || v === '-' || isNaN(v)) return '-';
        return Number(v).toFixed(digits);
    },

    fmtWan(v) {
        if (v === undefined || v === null || isNaN(v)) return '-';
        if (v >= 1e8) return (v/1e8).toFixed(2) + '亿';
        if (v >= 1e4) return (v/1e4).toFixed(2) + '万';
        return v.toFixed(0);
    },

    sign(v) { return v > 0 ? '+' : ''; },

    chgClass(v) { return v > 0 ? 'up' : (v < 0 ? 'down' : 'neutral'); }
};

// ============================
//  Data Fetching (East Money)
// ============================
const DataAPI = {
    BASE: 'https://push2.eastmoney.com/api/qt',

    async fetchJSON(url) {

    async getStockList(page, pageSize) {
        const fields = 'f12,f14,f2,f3,f4,f5,f6,f7,f8,f9,f10,f20,f21,f23,f24,f25,f22,f11,f62,f115,f162,f163,f133,f136,f100,f161,f164,f165,f166,f167,f168,f169,f170,f171,f172,f173,f174,f175,f176,f177,f178,f179,f180,f181,f182,f183,f184,f185,f186,f187,f188,f189,f190,f191,f192,f193,f194,f195,f196,f197,f198,f199,f200,f201,f202,f203,f204,f205,f206,f207,f208,f209,f210,f211,f212,f213,f214,f215,f216,f217,f218,f219,f220,f221,f222,f223,f224,f225,f226,f227,f228,f229,f230,f231,f232,f233,f234,f235,f236,f237,f238,f239,f240,f241,f242,f243,f244,f245,f246,f247,f248,f249,f250,f251,f252,f253,f254,f255,f256,f257,f258,f259,f260,f261,f262,f263,f264,f265,f266,f267,f268,f269,f270,f271,f272,f273,f274,f275,f276,f277,f278,f279,f280,f281,f282,f283,f284,f285,f286,f287,f288,f289,f290,f291,f292,f293,f294,f295,f296,f297,f298,f299,f300';
        const fs = 'm:0+t:6,m:0+t:13,m:0+t:80,m:1+t:2,m:1+t:23,m:0+t:81+s:204';
        const url = `${this.BASE}/clist/get?pn=${page}&pz=${pageSize}&po=1&np=1&ut=bd1d9ddb04089700cf9c27f6f7426281&fltt=2&invt=2&fid=f12&fs=${fs}&fields=${fields}&_=${Date.now()}`;
        return this.fetchJSON(url);
    },

    async getIndices() {
        const url = `${this.BASE}/ulist.np/get?fltt=2&invt=2&fields=f2,f3,f4,f12,f14,f6&secids=1.000001,0.399001,0.399006,1.000688&_=${Date.now()}`;
        return this.fetchJSON(url);
    },

    async getSectors(type) {
        // type: 'industry' (m:90+t:2) or 'concept' (m:90+t:3)
        const fs = type === 'industry' ? 'm:90+t:2' : 'm:90+t:3';
        const fields = 'f12,f14,f2,f3,f20,f8,f6';
        const url = `${this.BASE}/clist/get?pn=1&pz=100&po=1&np=1&ut=bd1d9ddb04089700cf9c27f6f7426281&fltt=2&invt=2&fid=f3&fs=${fs}&fields=${fields}&_=${Date.now()}`;
        return this.fetchJSON(url);
    },

    async getSectorFlow() {
        const fields = 'f12,f14,f2,f3,f62,f128,f140,f136,f141,f142,f145';
        const url = `${this.BASE}/clist/get?pn=1&pz=100&po=1&np=1&ut=bd1d9ddb04089700cf9c27f6f7426281&fltt=2&invt=2&fid=f62&fs=m:90+t:2&fields=${fields}&_=${Date.now()}`;

    async getStockFlow() {

        const url = `${this.BASE}/clist/get?pn=1&pz=100&po=1&np=1&ut=bd1d9ddb04089700cf9c27f6f7426281&fltt=2&invt=2&fid=f62&fs=m:0+t:6,m:0+t:13,m:0+t:80,m:1+t:2,m:1+t:23,m:0+t:81+s:204&fields=${fields}&_=${Date.now()}`;
        return this.fetchJSON(url);
    }
};

const FIELD_MAP = {
    f12: 'code', f14: 'name', f2: 'price', f3: 'change', f4: 'changeAmt',
    f5: 'volume', f6: 'amount', f7: 'amplitude', f8: 'turnover', f9: 'pe',
    f10: 'pb', f20: 'totalMV', f21: 'circMV', f23: 'roe', f24: 'revenueGrowth',
    f25: 'profitGrowth', f22: 'eps', f11: 'volumeRatio', f115: 'peg',
    f162: 'ps', f163: 'pcf', f133: 'revenueGrowthYoy', f136: 'profitGrowthYoy',
    f100: 'market', f62: 'mainInflow'
};

function parseStock(raw) {
    const s = {};
    for (const [k, v] of Object.entries(raw)) {
        if (FIELD_MAP[k]) s[FIELD_MAP[k]] = v;
    }
    // Scale corrections
    if (s.price) s.price /= 100;
    if (s.change) s.change /= 100;
    if (s.changeAmt) s.changeAmt /= 100;
    if (s.turnover) s.turnover /= 100;
    if (s.amplitude) s.amplitude /= 100;
    if (s.totalMV) s.totalMV /= 1e8; // to 亿
    if (s.circMV) s.circMV /= 1e8;
    if (s.amount) s.amount /= 1e4; // to 万
    if (s.roe) s.roe /= 100; // percent
    if (s.revenueGrowth) s.revenueGrowth /= 100;
    if (s.profitGrowth) s.profitGrowth /= 100;
    if (s.eps) s.eps /= 100;
    if (s.mainInflow) s.mainInflow /= 1e4; // to 万
    s.ticker = (s.market === 1 || String(s.code).startsWith('6')) ? s.code + '.SH' : s.code + '.SZ';
    s.score = computeScore(s);
    return s;
}

function computeScore(s) {
    let score = 50;
    if (s.pe > 0 && s.pe < 100) score += Math.max(0, 20 - s.pe / 5);
    if (s.pb > 0 && s.pb < 20) score += Math.max(0, 15 - s.pb * 2);
    if (s.roe > 0) score += Math.min(25, s.roe * 2); // roe already in decimal
    if (s.change !== undefined) score += Math.max(-10, Math.min(10, s.change * 0.5));
    if (s.totalMV > 0) {
        if (s.totalMV > 50 && s.totalMV < 1000) score += 10;
        else if (s.totalMV > 20 && s.totalMV < 5000) score += 5;
    }
    if (s.revenueGrowth > 0) score += Math.min(10, s.revenueGrowth * 10);
    if (s.profitGrowth > 0) score += Math.min(10, s.profitGrowth * 10);
    return Math.round(Math.min(100, Math.max(0, score)));
}

function getRating(score) {
    if (score >= 90) return 'AAAAA';
    if (score >= 80) return 'AAAA';
    if (score >= 70) return 'AAA';
    if (score >= 60) return 'AA';
    if (score >= 50) return 'A';
    return 'B';
}

// ============================
//  Dashboard
// ============================
const Dashboard = {
    async load() {
        App.updateStatus('加载中...', 'loading');
        try {
            await this.loadIndices();
            await App.sleep(200);
            await this.loadMarketData();
            App.updateStatus('就绪', '');
        } catch (e) {
            console.error(e);
            App.updateStatus('数据异常', 'error');
        }
    },

    async loadIndices() {
        const data = await DataAPI.getIndices();
        const list = (data.data && data.data.diff) || [];
        const names = { '000001': '上证指数', '399001': '深证成指', '399006': '创业板指', '000688': '科创50' };
        const html = list.map(item => {
            const code = String(item.f12 || '').padStart(6, '0');
            const name = names[code] || item.f14 || code;
            let price = item.f2, change = item.f3, changeAmt = item.f4;
            if (price !== undefined && price !== null && price !== '-') price = Number(price) / 100;
            if (change !== undefined && change !== null && change !== '-') change = Number(change) / 100;
            if (changeAmt !== undefined && changeAmt !== null && changeAmt !== '-') changeAmt = Number(changeAmt) / 100;
            const cls = App.chgClass(change);
            return `
            <div class="index-card">
                <div class="name">${name}</div>
                <div class="price ${cls}">${price !== undefined && !isNaN(price) ? price.toFixed(2) : '-'}</div>
                <div class="change-row">
                    <span class="${cls}">${App.sign(change)}${change !== undefined && !isNaN(change) ? change.toFixed(2) + '%' : '-'}</span>
                    <span class="${cls}">${App.sign(changeAmt)}${changeAmt !== undefined && !isNaN(changeAmt) ? changeAmt.toFixed(2) : '-'}</span>
                </div>
            </div>`;
        }).join('');
        document.getElementById('indexCards').innerHTML = html || '<div class="index-card">数据加载失败</div>';
    },

    async loadMarketData() {
        // Load all stocks to compute sentiment
        const stocks = [];
        for (let page = 1; page <= 3; page++) {
            const data = await DataAPI.getStockList(page, 500);
            if (data.data && data.data.diff) {
                stocks.push(...data.data.diff.map(parseStock));
            }
            await App.sleep(250);
        }
        App.allStocks = stocks;

        let up = 0, down = 0, flat = 0, totalAmount = 0;
        stocks.forEach(s => {
            if (s.change > 0) up++;
            else if (s.change < 0) down++;
            else flat++;
            if (s.amount) totalAmount += s.amount;
        });
        const total = up + down + flat;
        const upPct = total ? (up / total * 100).toFixed(1) : 0;
        const downPct = total ? (down / total * 100).toFixed(1) : 0;
        const flatPct = total ? (flat / total * 100).toFixed(1) : 0;

        document.getElementById('sentimentContent').innerHTML = `
            <div style="font-size:13px;color:var(--text-secondary);margin-bottom:8px">
                上涨 <span class="up">${up}</span> 家 / 下跌 <span class="down">${down}</span> 家 / 平盘 <span class="neutral">${flat}</span> 家
            </div>
            <div class="sentiment-bar">
                <div class="up-bar" style="width:${upPct}%" title="上涨 ${up} 家"></div>
                <div class="flat-bar" style="width:${flatPct}%" title="平盘 ${flat} 家"></div>
                <div class="down-bar" style="width:${downPct}%" title="下跌 ${down} 家"></div>
            </div>
            <div class="sentiment-legend">
                <span><span class="dot" style="background:var(--accent-up)"></span>上涨 ${upPct}%</span>
                <span><span class="dot" style="background:#484f58"></span>平盘 ${flatPct}%</span>
                <span><span class="dot" style="background:var(--accent-down)"></span>下跌 ${downPct}%</span>
            </div>
        `;

        document.getElementById('volumeContent').innerHTML = `
            <div style="font-size:32px;font-weight:700;font-family:monospace;margin-top:8px">${App.fmtWan(totalAmount * 1e4)}</div>
            <div style="font-size:13px;color:var(--text-secondary);margin-top:6px">沪深两市合计成交额</div>
        `;

        // Populate sector dropdown for screening
        const sectors = [...new Set(stocks.map(s => s.sector).filter(Boolean))].sort();
        const sel = document.getElementById('f-sector');
        if (sel && sel.options.length <= 1) {
            sectors.forEach(sec => {
                const opt = document.createElement('option');
                opt.value = sec; opt.textContent = sec;
                sel.appendChild(opt);
            });
        }
    }
};

const Heatmap = {

        App.loading(true, '加载板块数据...', 30);
        try {
            const data = await DataAPI.getSectors(type);
            const list = (data.data && data.data.diff) || [];
            this.data = list.map(item => ({
                code: item.f12,
                name: item.f14,
                price: item.f2 ? item.f2 / 100 : null,
                change: item.f3 ? item.f3 / 100 : 0,
                mv: item.f20 ? item.f20 / 1e8 : 0,
                turnover: item.f8 ? item.f8 / 100 : 0
            })).filter(s => s.name);
            this.render();
        } catch (e) {
            console.error(e);
            document.getElementById('heatmapContainer').innerHTML = '<div class="heatmap-loading">加载失败，请稍后重试</div>';
        } finally { App.loading(false); }
    },

    render() {
        const container = document.getElementById('heatmapContainer');
        if (!this.data.length) { container.innerHTML = '<div class="heatmap-loading">暂无数据</div>'; return; }

        const maxMV = Math.max(...this.data.map(d => d.mv), 1);
        const minChg = Math.min(...this.data.map(d => d.change), -5);
        const maxChg = Math.max(...this.data.map(d => d.change), 5);

        const html = this.data.map(d => {
            const size = Math.max(0.4, Math.min(1, d.mv / maxMV));
            const fontSize = 12 + size * 4;
            let bg, color;
            if (d.change > 0) {
                const intensity = Math.min(1, d.change / Math.max(1, maxChg));
                bg = `rgba(255,77,77,${0.15 + intensity * 0.6})`;
                color = '#ffcccc';
            } else if (d.change < 0) {
                const intensity = Math.min(1, Math.abs(d.change) / Math.max(1, Math.abs(minChg)));
                bg = `rgba(74,222,128,${0.15 + intensity * 0.6})`;
                color = '#ccffcc';
            } else {
                bg = 'rgba(255,255,255,0.05)'; color = '#aaa';
            }
            return `<div class="heatmap-cell" style="background:${bg};color:${color};font-size:${fontSize}px" onclick="Heatmap.filter('${d.name}')">
                <div class="hm-name">${d.name}</div>
                <div class="hm-change">${App.sign(d.change)}${d.change.toFixed(2)}%</div>
                <div class="hm-mv">${App.fmtWan(d.mv * 1e8)}</div>
            </div>`;
        }).join('');
        container.innerHTML = html;
    },

    filter(sectorName) {
        App.switchPanel('screen');
        const sel = document.getElementById('f-sector');
        if (sel) { sel.value = sectorName; }
        Screen.run();
        App.showToast('已切换至智能选股并应用板块：' + sectorName);
    }
};

// ============================
//  Screening
// ============================
const PRESETS = {
    custom:   {},
    value:    { peMin: 0, peMax: 15, pbMax: 2, mvMin: 50, excludeST: true, excludeBJ: true, sortBy: 'pe' },
    growth:   { peMin: 10, peMax: 60, mvMin: 20, revGrowthMin: 20, profitGrowthMin: 20, excludeST: true, excludeBJ: true, sortBy: 'score' },
    bluechip: { peMin: 0, peMax: 20, pbMax: 2, mvMin: 500, excludeST: true, excludeBJ: true, sortBy: 'mv' },
    smallcap: { peMin: 0, peMax: 80, pbMax: 5, mvMin: 10, mvMax: 200, excludeST: true, excludeBJ: true, sortBy: 'score' },
    trend:    { peMin: 0, peMax: 100, mvMin: 20, turnMin: 1, chg3dMin: 5, excludeST: true, excludeBJ: true, sortBy: 'change' },
    oversold: { peMin: 0, peMax: 50, pbMax: 3, mvMin: 20, chg20dMin: -20, chg20dMax: -5, excludeST: true, excludeBJ: true, sortBy: 'score' },
    dividend: { peMin: 0, peMax: 20, pbMax: 2, mvMin: 100, excludeST: true, excludeBJ: true, sortBy: 'pe' },
    highbonus:{ peMin: 0, peMax: 30, pbMax: 3, mvMin: 50, excludeST: true, excludeBJ: true, sortBy: 'score' },
    cashflow: { peMin: 0, peMax: 40, pbMax: 3, mvMin: 20, cashflowMin: 0, excludeST: true, excludeBJ: true, sortBy: 'score' },
    institution: { peMin: 0, peMax: 50, pbMax: 5, mvMin: 100, excludeST: true, excludeBJ: true, sortBy: 'mv' }
};

const Screen = {
    results: [],
    sortState: { key: 'score', asc: false },

    applyPreset(name) {
        document.querySelectorAll('.preset-btn').forEach(b => b.classList.toggle('active', b.dataset.preset === name));
        const p = PRESETS[name] || {};
        const set = (id, v) => { const el = document.getElementById('f-' + id); if (el) el.value = v !== undefined ? v : ''; };
        set('peMin', p.peMin); set('peMax', p.peMax);
        set('pbMin', p.pbMin); set('pbMax', p.pbMax);
        set('psMin', p.psMin); set('psMax', p.psMax);
        set('pegMin', p.pegMin); set('pegMax', p.pegMax);
        set('roeMin', p.roeMin); set('npmMin', p.npmMin);
        set('revGrowthMin', p.revGrowthMin); set('profitGrowthMin', p.profitGrowthMin);
        set('debtMax', p.debtMax); set('cashflowMin', p.cashflowMin);
        set('turnMin', p.turnMin); set('turnMax', p.turnMax);
        set('amountMin', p.amountMin); set('chg3dMin', p.chg3dMin);
        set('chg20dMin', p.chg20dMin); set('chg60dMin', p.chg60dMin);
        set('mvMin', p.mvMin); set('mvMax', p.mvMax);
        if (p.sortBy) document.getElementById('f-sortBy').value = p.sortBy;
        if (p.excludeST !== undefined) document.getElementById('f-exST').checked = p.excludeST;
        if (p.excludeBJ !== undefined) document.getElementById('f-exBJ').checked = p.excludeBJ;
    },

    reset() { this.applyPreset('custom'); document.getElementById('f-maxResults').value = 50; document.getElementById('f-sortBy').value = 'score'; },

    getVal(id) {
        const el = document.getElementById('f-' + id);
        return el && el.value !== '' ? parseFloat(el.value) : undefined;
    },

    async run() {
        if (App.allStocks.length === 0) {
            App.showToast('正在加载股票数据，请稍后...', true);
            await Dashboard.loadMarketData();
        }
        App.loading(true, '筛选股票...', 50);
        await App.sleep(50);

        const peMin = this.getVal('peMin') || 0;
        const peMax = this.getVal('peMax'); if (peMax === undefined) peMax = Infinity;
        const pbMin = this.getVal('pbMin') || 0;
        const pbMax = this.getVal('pbMax'); if (pbMax === undefined) pbMax = Infinity;
        const psMin = this.getVal('psMin') || 0;
        const psMax = this.getVal('psMax'); if (psMax === undefined) psMax = Infinity;
        const pegMin = this.getVal('pegMin') || 0;
        const pegMax = this.getVal('pegMax'); if (pegMax === undefined) pegMax = Infinity;
        const roeMin = this.getVal('roeMin');
        const npmMin = this.getVal('npmMin');
        const revGrowthMin = this.getVal('revGrowthMin');
        const profitGrowthMin = this.getVal('profitGrowthMin');
        const debtMax = this.getVal('debtMax');
        const cashflowMin = this.getVal('cashflowMin');
        const turnMin = this.getVal('turnMin') || 0;
        const turnMax = this.getVal('turnMax'); if (turnMax === undefined) turnMax = Infinity;
        const amountMin = this.getVal('amountMin') || 0;
        const chg3dMin = this.getVal('chg3dMin');
        const chg20dMin = this.getVal('chg20dMin');
        const chg60dMin = this.getVal('chg60dMin');
        const mvMin = this.getVal('mvMin') || 0;
        const mvMax = this.getVal('mvMax'); if (mvMax === undefined) mvMax = Infinity;
        const sector = document.getElementById('f-sector').value;
        const exST = document.getElementById('f-exST').checked;
        const exBJ = document.getElementById('f-exBJ').checked;
        const exKC = document.getElementById('f-exKC').checked;
        const exCY = document.getElementById('f-exCY').checked;
        const large = document.getElementById('sc-large').checked;
        const mid = document.getElementById('sc-mid').checked;
        const small = document.getElementById('sc-small').checked;
        const maxResults = parseInt(document.getElementById('f-maxResults').value) || 50;
        const sortBy = document.getElementById('f-sortBy').value;

        let filtered = App.allStocks.filter(s => {
            if (exST && s.name && (s.name.includes('ST') || s.name.includes('退'))) return false;
            if (exBJ && s.code && (s.code.startsWith('8') || s.code.startsWith('4'))) return false;
            if (exKC && s.code && s.code.startsWith('688')) return false;
            if (exCY && s.code && s.code.startsWith('300')) return false;
            if (s.pe !== undefined && s.pe !== null) { if (s.pe <= 0 || s.pe < peMin || s.pe > peMax) return false; } else if (peMin > 0) return false;
            if (s.pb !== undefined && s.pb !== null) { if (s.pb <= 0 || s.pb < pbMin || s.pb > pbMax) return false; } else if (pbMin > 0) return false;
            if (s.ps !== undefined && s.ps !== null) { if (s.ps < psMin || s.ps > psMax) return false; }
            if (s.peg !== undefined && s.peg !== null) { if (s.peg < pegMin || s.peg > pegMax) return false; }
            if (s.roe !== undefined && roeMin !== undefined && s.roe < roeMin / 100) return false;
            if (s.revenueGrowth !== undefined && revGrowthMin !== undefined && s.revenueGrowth * 100 < revGrowthMin) return false;
            if (s.profitGrowth !== undefined && profitGrowthMin !== undefined && s.profitGrowth * 100 < profitGrowthMin) return false;
            if (s.totalMV !== undefined && s.totalMV !== null) { if (s.totalMV < mvMin || s.totalMV > mvMax) return false; }
            if (s.turnover !== undefined && s.turnover !== null) { if (s.turnover < turnMin || s.turnover > turnMax) return false; }
            if (s.amount !== undefined && s.amount !== null && s.amount < amountMin) return false;
            if (sector && s.sector && s.sector !== sector) return false;
            // Market cap classification
            if (s.totalMV > 0) {
                const isLarge = s.totalMV > 1000;
                const isMid = s.totalMV >= 100 && s.totalMV <= 1000;
                const isSmall = s.totalMV < 100;
                if ((isLarge && !large) || (isMid && !mid) || (isSmall && !small)) return false;
            }
            return true;
        });

        // Sort
        const sortMap = { score: 'score', pe: 'pe', pb: 'pb', mv: 'totalMV', change: 'change', roe: 'roe' };
        const sortKey = sortMap[sortBy] || 'score';
        const asc = sortKey === 'pe' || sortKey === 'pb' || sortKey === 'mv';
        filtered.sort((a, b) => {
            const va = a[sortKey] !== undefined ? a[sortKey] : (asc ? Infinity : -Infinity);
            const vb = b[sortKey] !== undefined ? b[sortKey] : (asc ? Infinity : -Infinity);
            return asc ? (va > vb ? 1 : -1) : (va < vb ? 1 : -1);
        });
        this.results = filtered.slice(0, maxResults);
        this.sortState = { key: sortKey, asc };
        App.loading(false);
        this.render();
    },

    render() {
        const n = this.results.length;
        document.getElementById('s-count').textContent = n;
        const avg = key => {
            const vals = this.results.map(s => s[key]).filter(v => v !== undefined && !isNaN(v) && v > 0);
            return vals.length ? (vals.reduce((a, b) => a + b, 0) / vals.length).toFixed(2) : '-';
        };
        document.getElementById('s-avgPE').textContent = avg('pe');
        document.getElementById('s-avgPB').textContent = avg('pb');
        document.getElementById('s-avgScore').textContent = avg('score');
        document.getElementById('s-avgMV').textContent = avg('totalMV');

        const container = document.getElementById('screenTableWrap');
        if (n === 0) { container.innerHTML = '<div class="empty-state"><div class="big-icon">[ 无结果 ]</div><p>没有符合条件的股票，请放宽筛选条件</p></div>'; return; }

        let html = '<div class="toolbar"><div class="info">共 <strong>' + n + '</strong> 只 &nbsp;点击表头排序</div></div>';
        html += '<div class="table-wrap"><table class="data-table"><thead><tr>';
        const headers = [
            { key: 'rank', label: '排名' },
            { key: 'code', label: '代码' },
            { key: 'name', label: '名称' },
            { key: 'price', label: '最新价' },
            { key: 'change', label: '涨跌幅' },
            { key: 'pe', label: 'PE' },
            { key: 'pb', label: 'PB' },
            { key: 'roe', label: 'ROE' },
            { key: 'revenueGrowth', label: '营收增长' },
            { key: 'profitGrowth', label: '利润增长' },
            { key: 'score', label: '评分' },
            { key: 'rating', label: '评级' }
        ];
        headers.forEach(h => {
            const active = this.sortState.key === h.key ? (this.sortState.asc ? '▲' : '▼') : '▽';
            html += `<th onclick="Screen.sort('${h.key}')">${h.label}<span class="sort-icon">${active}</span></th>`;
        });
        html += '</tr></thead><tbody>';
        this.results.forEach((s, i) => {
            const chgClass = App.chgClass(s.change);
            html += `<tr>
                <td>${i + 1}</td>
                <td class="code">${s.code || ''}</td>
                <td class="name">${s.name || ''}</td>
                <td class="num">${App.fmtNum(s.price)}</td>
                <td class="num ${chgClass}">${App.sign(s.change)}${App.fmtNum(s.change)}%</td>
                <td class="num">${s.pe > 0 ? s.pe.toFixed(1) : '-'}</td>
                <td class="num">${s.pb > 0 ? s.pb.toFixed(2) : '-'}</td>
                <td class="num">${s.roe > 0 ? (s.roe * 100).toFixed(1) + '%' : '-'}</td>
                <td class="num">${s.revenueGrowth !== undefined ? (s.revenueGrowth * 100).toFixed(1) + '%' : '-'}</td>
                <td class="num">${s.profitGrowth !== undefined ? (s.profitGrowth * 100).toFixed(1) + '%' : '-'}</td>
                <td class="score">${s.score}</td>
                <td class="rating">${getRating(s.score)}</td>
            </tr>`;
        });
        html += '</tbody></table></div>';
        container.innerHTML = html;
    },

    sort(key) {
        if (this.sortState.key === key) this.sortState.asc = !this.sortState.asc;
        else { this.sortState.key = key; this.sortState.asc = key === 'pe' || key === 'pb' || key === 'mv' || key === 'code'; }
        const { key: k, asc } = this.sortState;
        this.results.sort((a, b) => {
            const va = a[k] !== undefined ? a[k] : (asc ? Infinity : -Infinity);
            const vb = b[k] !== undefined ? b[k] : (asc ? Infinity : -Infinity);
            return asc ? (va > vb ? 1 : -1) : (va < vb ? 1 : -1);
        });
        this.render();
    },

    exportCSV() {
        if (this.results.length === 0) { App.showToast('没有数据可导出', true); return; }
        const headers = ['排名', '代码', '名称', '最新价', '涨跌幅', 'PE', 'PB', '总市值(亿)', 'ROE', '营收增长', '利润增长', '评分', '评级'];
        const rows = this.results.map((s, i) => [
            i + 1, s.code || '', s.name || '', s.price !== undefined ? s.price.toFixed(2) : '',
            s.change !== undefined ? s.change.toFixed(2) : '', s.pe > 0 ? s.pe.toFixed(1) : '', s.pb > 0 ? s.pb.toFixed(2) : '',
            s.totalMV !== undefined ? s.totalMV.toFixed(2) : '', s.roe > 0 ? (s.roe * 100).toFixed(1) + '%' : '',
            s.revenueGrowth !== undefined ? (s.revenueGrowth * 100).toFixed(1) + '%' : '',
            s.profitGrowth !== undefined ? (s.profitGrowth * 100).toFixed(1) + '%' : '',
            s.score, getRating(s.score)
        ]);
        const csv = '\uFEFF' + [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = '选股结果_' + new Date().toLocaleDateString() + '.csv';
        link.click();
    }
};

// ============================
//  Fund Flow
// ============================
const FundFlow = {
    loaded: false,

    async load() {
        App.loading(true, '加载资金流向...', 30);
        try {
            // Sector flow
            const secData = await DataAPI.getSectorFlow();
            const sectors = ((secData.data && secData.data.diff) || []).map(item => ({
                name: item.f14,
                change: item.f3 ? item.f3 / 100 : 0,
                inflow: item.f62 ? item.f62 / 1e8 : 0 // 亿
            })).filter(s => s.name).sort((a, b) => b.inflow - a.inflow);

            const inTop = sectors.slice(0, 10);
            const outTop = sectors.slice(-10).reverse();

            const renderList = (list, isOut) => list.map((s, i) => {
                const cls = isOut ? 'down' : 'up';
                return `<div class="flow-item">
                    <div class="left"><div class="rank ${i < 3 ? 'top' : ''}">${i + 1}</div><div class="info"><div class="name">${s.name}</div><div class="meta">${App.sign(s.change)}${s.change.toFixed(2)}%</div></div></div>
                    <div class="right"><div class="val ${cls}">${isOut ? '-' : '+'}${Math.abs(s.inflow).toFixed(2)}亿</div></div>
                </div>`;
            }).join('');

            document.getElementById('flowIndustryIn').innerHTML = renderList(inTop, false);
            document.getElementById('flowIndustryOut').innerHTML = renderList(outTop, true);

            // Stock flow
            const stockData = await DataAPI.getStockFlow();
            const stocks = ((stockData.data && stockData.data.diff) || []).map(item => ({
                code: item.f12, name: item.f14,
                change: item.f3 ? item.f3 / 100 : 0,
                inflow: item.f62 ? item.f62 / 1e4 : 0 // 万
            })).filter(s => s.name).sort((a, b) => b.inflow - a.inflow);

            const stockIn = stocks.slice(0, 10);
            const stockOut = stocks.slice(-10).reverse();

            const renderStock = (list, isOut) => list.map((s, i) => {
                const cls = isOut ? 'down' : 'up';
                return `<div class="flow-item">
                    <div class="left"><div class="rank ${i < 3 ? 'top' : ''}">${i + 1}</div><div class="info"><div class="name">${s.name} <span style="font-size:11px;color:var(--text-secondary)">${s.code}</span></div><div class="meta">${App.sign(s.change)}${s.change.toFixed(2)}%</div></div></div>
                    <div class="right"><div class="val ${cls}">${isOut ? '-' : '+'}${App.fmtWan(Math.abs(s.inflow) * 1e4)}</div></div>
                </div>`;
            }).join('');

            document.getElementById('flowStockIn').innerHTML = renderStock(stockIn, false);
            document.getElementById('flowStockOut').innerHTML = renderStock(stockOut, true);

            this.loaded = true;
        } catch (e) {
            console.error(e);
            App.showToast('资金流向加载失败', true);
        } finally { App.loading(false); }
    }
};

// ============================
//  Backtest (Simplified)
// ============================
const Backtest = {
    run() {
        const strategy = document.getElementById('bt-strategy').value;
        const start = document.getElementById('bt-start').value;
        const end = document.getElementById('bt-end').value;
        const cash = parseFloat(document.getElementById('bt-cash').value) * 10000;
        if (!start || !end) { App.showToast('请选择回测日期范围', true); return; }
        if (App.allStocks.length === 0) { App.showToast('股票数据尚未加载完成', true); return; }

        App.loading(true, '运行回测模拟...', 60);
        setTimeout(() => {
            try {
                this.simulate(strategy, start, end, cash);
            } finally { App.loading(false); }
        }, 400);
    },

    simulate(strategy, start, end, cash) {
        // Apply strategy preset to current stock universe to get "holdings"
        const preset = PRESETS[strategy] || PRESETS.value;
        const filtered = App.allStocks.filter(s => {
            if (s.pe !== undefined && s.pe !== null) {
                if (s.pe <= 0 || s.pe < (preset.peMin || 0) || s.pe > (preset.peMax || Infinity)) return false;
            }
            if (s.pb !== undefined && s.pb !== null && preset.pbMax !== undefined) {
                if (s.pb <= 0 || s.pb > preset.pbMax) return false;
            }
            if (s.totalMV !== undefined && s.totalMV !== null && preset.mvMin !== undefined) {
                if (s.totalMV < preset.mvMin) return false;
            }
            if (s.name && s.name.includes('ST')) return false;
            return true;
        }).slice(0, 20);

        // Simulate returns using stock characteristics (simplified for v4.0)
        const days = Math.max(1, Math.round((new Date(end) - new Date(start)) / 86400000));
        const months = Math.max(1, days / 30);

        let totalReturn = 0, maxDrawdown = 0, trades = 0;
        const tradesList = [];
        const portfolio = [];

        const perStock = cash / Math.min(filtered.length, 10);
        filtered.slice(0, 10).forEach(s => {
            const expectedMonthly = (s.roe || 0.05) * 0.3 + (s.revenueGrowth || 0) * 0.2 + (Math.random() - 0.5) * 0.05;
            const totalRet = expectedMonthly * months;
            const maxDD = Math.abs((Math.random() * 0.15 + 0.05) * (1 - (s.score || 50) / 100));
            totalReturn += totalRet / 10;
            maxDrawdown = Math.max(maxDrawdown, maxDD);
            trades++;
            tradesList.push({ name: s.name, ret: totalRet * 100 });
            portfolio.push({ name: s.name, weight: 10, ret: totalRet * 100 });
        });

        const annualReturn = totalReturn * 12 / Math.max(1, months);
        const sharpe = annualReturn / (Math.max(0.01, maxDrawdown) * 100);

        let html = '<div class="metrics-row">';
        const metrics = [
            { label: '总收益率', value: (totalReturn * 100).toFixed(2) + '%', cls: totalReturn >= 0 ? 'up' : 'down' },
            { label: '年化收益率', value: (annualReturn * 100).toFixed(2) + '%', cls: annualReturn >= 0 ? 'up' : 'down' },
            { label: '最大回撤', value: (maxDrawdown * 100).toFixed(2) + '%', cls: '' },
            { label: '夏普比率', value: sharpe.toFixed(2), cls: '' },
            { label: '交易次数', value: trades, cls: '' }
        ];
        metrics.forEach(m => { html += `<div class="metric-box"><div class="val ${m.cls}">${m.value}</div><div class="lbl">${m.label}</div></div>`; });
        html += '</div>';

        html += '<div class="card"><div class="card-title">持仓明细</div>';
        html += '<div class="table-wrap"><table class="data-table"><thead><tr><th>股票</th><th>权重</th><th>估算收益</th></tr></thead><tbody>';
        portfolio.forEach(p => {
            html += `<tr><td class="name">${p.name}</td><td class="num">${p.weight}%</td><td class="num ${p.ret >= 0 ? 'up' : 'down'}">${p.ret >= 0 ? '+' : ''}${p.ret.toFixed(2)}%</td></tr>`;
        });
        html += '</tbody></table></div></div>';

        html += '<div class="card" style="margin-top:16px"><div class="card-title">回测说明</div><div style="font-size:13px;color:var(--text-secondary);line-height:1.6">';
        html += '本回测为简化模拟，基于当前财务指标与估值水平进行估算，不构成投资建议。实际回测需要历史行情数据，v4.0 为前端简化版本。';
        html += '</div></div>';

        document.getElementById('backtestResult').innerHTML = html;
    }
};
