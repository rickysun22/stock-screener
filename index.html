<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>选股小工具 v3.0 - 多因子智能选股</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2196F3; --primary-dark: #1976D2; --secondary: #4CAF50;
            --danger: #f44336; --warning: #FF9800; --bg: #f5f7fa;
            --card-bg: #ffffff; --text: #333333; --text-secondary: #666666;
            --border: #e0e6ed; --shadow: 0 2px 12px rgba(0,0,0,0.08);
            --shadow-lg: 0 8px 32px rgba(0,0,0,0.12); --radius: 12px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px 32px; box-shadow: var(--shadow-lg); position: relative; overflow: hidden; }
        .header h1 { font-size: 26px; font-weight: 700; display: flex; align-items: center; gap: 10px; }
        .header h1 .icon { font-size: 30px; }
        .header .subtitle { margin-top: 4px; opacity: 0.85; font-size: 13px; font-weight: 300; }
        .header .version { position: absolute; top: 16px; right: 32px; background: rgba(255,255,255,0.2); padding: 4px 12px; border-radius: 20px; font-size: 12px; }

        /* Mode Switcher */
        .mode-bar { background: rgba(255,255,255,0.1); padding: 8px 32px; display: flex; align-items: center; gap: 16px; backdrop-filter: blur(10px); border-top: 1px solid rgba(255,255,255,0.1); }
        .mode-bar label { font-size: 13px; opacity: 0.9; }
        .mode-toggle { display: flex; gap: 4px; background: rgba(0,0,0,0.2); padding: 4px; border-radius: 8px; }
        .mode-btn { padding: 6px 14px; border: none; border-radius: 6px; background: transparent; color: white; font-size: 13px; cursor: pointer; transition: all 0.2s; }
        .mode-btn.active { background: rgba(255,255,255,0.25); font-weight: 500; }
        .mode-btn:hover:not(.active) { background: rgba(255,255,255,0.1); }
        .api-status { margin-left: auto; font-size: 12px; display: flex; align-items: center; gap: 6px; }
        .api-status .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--secondary); }
        .api-status.offline .dot { background: var(--danger); }

        .main-container { display: flex; max-width: 1600px; margin: 0 auto; padding: 24px; gap: 24px; min-height: calc(100vh - 160px); }
        .sidebar { width: 340px; flex-shrink: 0; }
        .filter-card { background: var(--card-bg); border-radius: var(--radius); padding: 24px; box-shadow: var(--shadow); margin-bottom: 16px; }
        .filter-card h3 { font-size: 15px; margin-bottom: 16px; color: var(--text); display: flex; align-items: center; gap: 8px; }
        .filter-card h3 .icon { font-size: 18px; }
        .form-group { margin-bottom: 14px; }
        .form-group label { display: block; font-size: 13px; color: var(--text-secondary); margin-bottom: 5px; font-weight: 500; }
        .form-group input, .form-group select { width: 100%; padding: 8px 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; background: #fafbfc; transition: border-color 0.2s; }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: var(--primary); }
        .form-row { display: flex; gap: 10px; }
        .form-row .form-group { flex: 1; }
        .checkbox-group { display: flex; gap: 16px; flex-wrap: wrap; margin-top: 12px; }
        .checkbox-group label { display: flex; align-items: center; gap: 6px; font-size: 13px; cursor: pointer; }
        .checkbox-group input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--primary); }
        .btn-primary { width: 100%; padding: 12px; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: 500; cursor: pointer; transition: all 0.2s; margin-top: 8px; }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(33,150,243,0.3); }
        .btn-primary:active { transform: translateY(0); }
        .btn-secondary { padding: 8px 16px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; font-size: 13px; cursor: pointer; transition: all 0.2s; }
        .btn-secondary:hover { background: var(--border); }

        /* Presets */
        .preset-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 16px; }
        .preset-btn { padding: 8px 10px; border: 1px solid var(--border); border-radius: 8px; background: #fafbfc; font-size: 12px; cursor: pointer; transition: all 0.2s; text-align: center; }
        .preset-btn:hover { border-color: var(--primary); color: var(--primary); }
        .preset-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

        /* Content */
        .content { flex: 1; min-width: 0; }
        .tabs { display: flex; gap: 4px; margin-bottom: 16px; background: var(--card-bg); padding: 4px; border-radius: 10px; box-shadow: var(--shadow); }
        .tab-btn { flex: 1; padding: 10px 20px; border: none; border-radius: 8px; background: transparent; font-size: 14px; cursor: pointer; transition: all 0.2s; color: var(--text-secondary); }
        .tab-btn.active { background: var(--card-bg); color: var(--primary); font-weight: 500; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .tab-btn:hover:not(.active) { color: var(--text); }
        .tab-panel { display: none; }
        .tab-panel.active { display: block; }

        /* Stats */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 16px; margin-bottom: 20px; }
        .stat-card { background: var(--card-bg); border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow); text-align: center; }
        .stat-card .value { font-size: 24px; font-weight: 700; color: var(--primary); }
        .stat-card .label { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }

        /* Table */
        .table-container { background: var(--card-bg); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
        .table-toolbar { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; border-bottom: 1px solid var(--border); }
        .table-toolbar .count { font-size: 14px; color: var(--text-secondary); }
        .table-toolbar .count strong { color: var(--primary); font-size: 18px; }
        .data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .data-table th { background: #f8f9fa; padding: 12px 16px; text-align: left; font-weight: 600; color: var(--text-secondary); font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; cursor: pointer; user-select: none; }
        .data-table th:hover { color: var(--primary); }
        .data-table td { padding: 12px 16px; border-bottom: 1px solid var(--border); }
        .data-table tr:hover { background: #f8f9fa; }
        .data-table .code { font-family: 'SF Mono', monospace; font-size: 12px; color: var(--primary); font-weight: 500; }
        .data-table .name { font-weight: 500; }
        .data-table .positive { color: #e53935; }
        .data-table .negative { color: #43a047; }
        .data-table .score { font-weight: 700; color: var(--primary); }
        .data-table .rating { white-space: nowrap; }
        .data-table .tech-signals { font-size: 11px; color: var(--text-secondary); max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* Empty State */
        .empty-state { text-align: center; padding: 60px 20px; color: var(--text-secondary); }
        .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
        .empty-state p { font-size: 14px; }

        /* Loading */
        .loading-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(255,255,255,0.9); display: none; justify-content: center; align-items: center; flex-direction: column; z-index: 1000; backdrop-filter: blur(4px); }
        .loading-overlay.active { display: flex; }
        .spinner { width: 48px; height: 48px; border: 4px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { margin-top: 16px; font-size: 14px; color: var(--text-secondary); }
        .loading-bar { width: 200px; height: 4px; background: var(--border); border-radius: 2px; margin-top: 12px; overflow: hidden; }
        .loading-bar-inner { height: 100%; background: var(--primary); border-radius: 2px; width: 0%; transition: width 0.3s; }

        /* Backtest Form */
        .backtest-form { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 20px; }
        .backtest-result { background: var(--card-bg); border-radius: var(--radius); padding: 24px; box-shadow: var(--shadow); }
        .backtest-metrics { display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px; margin-bottom: 20px; }
        .backtest-metric { text-align: center; padding: 16px; background: #f8f9fa; border-radius: 8px; }
        .backtest-metric .value { font-size: 20px; font-weight: 700; }
        .backtest-metric .label { font-size: 11px; color: var(--text-secondary); margin-top: 4px; }
        .backtest-metric.positive .value { color: #e53935; }
        .backtest-metric.negative .value { color: #43a047; }

        /* Responsive */
        @media (max-width: 1200px) { .main-container { flex-direction: column; } .sidebar { width: 100%; } }
        @media (max-width: 768px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } .backtest-form { grid-template-columns: 1fr; } .backtest-metrics { grid-template-columns: repeat(2, 1fr); } .data-table { font-size: 12px; } .data-table th, .data-table td { padding: 8px 10px; } }
    </style>
</head>
<body>
    <div class="header">
        <div class="version">v3.0</div>
        <h1><span class="icon">&#x1F4C8;</span> 选股小工具</h1>
        <p class="subtitle">多因子智能选股 · 策略追踪 · 回测分析</p>
    </div>

    <div class="mode-bar">
        <label>&#x1F4E1; 数据源模式:</label>
        <div class="mode-toggle">
            <button class="mode-btn active" data-mode="frontend" onclick="switchMode('frontend')">&#x26A1; 免费前端 (AkShare)</button>
            <button class="mode-btn" data-mode="backend" onclick="switchMode('backend')">&#x1F680; 后端 API (iFinD)</button>
        </div>
        <div class="api-status" id="apiStatus">
            <span class="dot"></span>
            <span id="apiStatusText">API 未连接</span>
        </div>
    </div>

    <div class="main-container">
        <div class="sidebar">
            <div class="filter-card">
                <h3><span class="icon">&#x1F3AF;</span> 策略预设</h3>
                <div class="preset-grid">
                    <button class="preset-btn active" data-preset="custom" onclick="applyPreset('custom')">自定义</button>
                    <button class="preset-btn" data-preset="value" onclick="applyPreset('value')">价值精选</button>
                    <button class="preset-btn" data-preset="growth" onclick="applyPreset('growth')">成长猎手</button>
                    <button class="preset-btn" data-preset="bluechip" onclick="applyPreset('bluechip')">低估蓝筹</button>
                    <button class="preset-btn" data-preset="smallcap" onclick="applyPreset('smallcap')">小盘成长</button>
                    <button class="preset-btn" data-preset="trend" onclick="applyPreset('trend')">趋势突破</button>
                    <button class="preset-btn" data-preset="oversold" onclick="applyPreset('oversold')">超跌反弹</button>
                    <button class="preset-btn" data-preset="mabullet" onclick="applyPreset('mabullet')">均线多头</button>
                </div>
            </div>

            <div class="filter-card">
                <h3><span class="icon">&#x1F4CA;</span> 基本面筛选</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label>PE 最小</label>
                        <input type="number" id="peMin" value="0" step="1">
                    </div>
                    <div class="form-group">
                        <label>PE 最大</label>
                        <input type="number" id="peMax" value="50" step="1">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>PB 最小</label>
                        <input type="number" id="pbMin" value="" step="0.1">
                    </div>
                    <div class="form-group">
                        <label>PB 最大</label>
                        <input type="number" id="pbMax" value="3" step="0.1">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>市值最小(亿)</label>
                        <input type="number" id="mvMin" value="20" step="10">
                    </div>
                    <div class="form-group">
                        <label>市值最大(亿)</label>
                        <input type="number" id="mvMax" value="10000" step="100">
                    </div>
                </div>
                <div class="checkbox-group">
                    <label><input type="checkbox" id="excludeST" checked> 排除ST</label>
                    <label><input type="checkbox" id="excludeBJ" checked> 排除北交所</label>
                    <label><input type="checkbox" id="excludeKC"> 排除科创板</label>
                    <label><input type="checkbox" id="excludeCY"> 排除创业板</label>
                </div>
            </div>

            <div class="filter-card" id="techFilterCard" style="opacity:0.6; pointer-events:none;">
                <h3><span class="icon">&#x1F4C9;</span> 技术指标 (API模式)</h3>
                <div class="checkbox-group">
                    <label><input type="checkbox" id="maBullish"> 均线多头排列</label>
                    <label><input type="checkbox" id="macdGolden"> MACD金叉</label>
                    <label><input type="checkbox" id="kdjGolden"> KDJ金叉</label>
                    <label><input type="checkbox" id="bollLower"> 跌破布林下轨</label>
                </div>
                <div class="form-group" style="margin-top:12px;">
                    <label>最少满足信号数</label>
                    <input type="number" id="minSignals" value="1" min="1" max="5" step="1">
                </div>
            </div>

            <div class="filter-card">
                <h3><span class="icon">&#x2699;&#xFE0F;</span> 输出设置</h3>
                <div class="form-group">
                    <label>最大结果数</label>
                    <input type="number" id="maxResults" value="50" min="10" max="200" step="10">
                </div>
                <div class="form-group">
                    <label>排序方式</label>
                    <select id="sortBy">
                        <option value="score">综合评分</option>
                        <option value="pe">PE 由低到高</option>
                        <option value="pb">PB 由低到高</option>
                        <option value="mv">市值由小到大</option>
                    </select>
                </div>
                <button class="btn-primary" onclick="runScreen()">&#x1F680; 执行选股</button>
                <button class="btn-secondary" style="width:100%; margin-top:8px;" onclick="exportCSV()">&#x1F4E5; 导出 CSV</button>
                <button class="btn-secondary" style="width:100%; margin-top:8px; color:var(--danger);" onclick="resetFilters()">&#x1F504; 重置条件</button>
            </div>
        </div>

        <div class="content">
            <div class="tabs">
                <button class="tab-btn active" data-tab="screen" onclick="switchTab('screen')">&#x1F3AF; 选股结果</button>
                <button class="tab-btn" data-tab="history" onclick="switchTab('history')">&#x1F4DC; 历史记录</button>
                <button class="tab-btn" data-tab="backtest" onclick="switchTab('backtest')">&#x1F4C8; 回测分析</button>
            </div>

            <!-- 选股结果 -->
            <div class="tab-panel active" id="panel-screen">
                <div class="stats-grid" id="statsGrid">
                    <div class="stat-card"><div class="value" id="statCount">-</div><div class="label">选中数量</div></div>
                    <div class="stat-card"><div class="value" id="statAvgPE">-</div><div class="label">平均 PE</div></div>
                    <div class="stat-card"><div class="value" id="statAvgPB">-</div><div class="label">平均 PB</div></div>
                    <div class="stat-card"><div class="value" id="statAvgScore">-</div><div class="label">平均评分</div></div>
                    <div class="stat-card"><div class="value" id="statAvgMV">-</div><div class="label">平均市值(亿)</div></div>
                </div>
                <div class="table-container" id="tableContainer">
                    <div class="empty-state">
                        <div class="icon">&#x1F4C8;</div>
                        <p>点击左侧「执行选股」开始筛选</p>
                        <p style="font-size:12px; margin-top:8px; opacity:0.7;">当前模式: <span id="currentModeText">免费前端 (AkShare)</span></p>
                    </div>
                </div>
            </div>

            <!-- 历史记录 -->
            <div class="tab-panel" id="panel-history">
                <div class="table-container">
                    <div class="table-toolbar">
                        <span class="count">选股历史记录</span>
                        <button class="btn-secondary" onclick="loadHistory()">&#x1F504; 刷新</button>
                    </div>
                    <div id="historyContainer">
                        <div class="empty-state">
                            <div class="icon">&#x1F4DC;</div>
                            <p>历史记录仅在「后端 API」模式下可用</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 回测分析 -->
            <div class="tab-panel" id="panel-backtest">
                <div class="filter-card" style="margin-bottom:20px;">
                    <h3>&#x1F4C8; 回测参数</h3>
                    <div class="backtest-form">
                        <div class="form-group">
                            <label>回测策略</label>
                            <select id="btStrategy">
                                <option value="custom">自定义</option>
                                <option value="value">价值精选</option>
                                <option value="growth">成长猎手</option>
                                <option value="bluechip">低估蓝筹</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>开始日期</label>
                            <input type="date" id="btStartDate">
                        </div>
                        <div class="form-group">
                            <label>结束日期</label>
                            <input type="date" id="btEndDate">
                        </div>
                        <div class="form-group">
                            <label>初始资金(万元)</label>
                            <input type="number" id="btCash" value="100" step="10">
                        </div>
                        <div class="form-group">
                            <label>单票仓位上限(%)</label>
                            <input type="number" id="btMaxPos" value="20" step="5">
                        </div>
                        <div class="form-group">
                            <label>调仓频率</label>
                            <select id="btRebalance">
                                <option value="monthly">月度</option>
                                <option value="weekly">周度</option>
                            </select>
                        </div>
                    </div>
                    <button class="btn-primary" onclick="runBacktest()" style="width:auto; padding: 10px 32px;">&#x25B6; 运行回测</button>
                </div>
                <div id="backtestResultContainer">
                    <div class="empty-state">
                        <div class="icon">&#x1F4C8;</div>
                        <p>回测功能仅在「后端 API」模式下可用</p>
                        <p style="font-size:12px; margin-top:8px; opacity:0.7;">请先切换至后端 API 模式并启动 api_server.py</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <div class="loading-text" id="loadingText">加载中...</div>
        <div class="loading-bar"><div class="loading-bar-inner" id="loadingBar"></div></div>
    </div>

    <script>
    // ── 配置 ──
    const API_BASE = window.location.origin.includes('localhost') ? 'http://localhost:8000' : '';
    const EASTMONEY_API = 'https://push2.eastmoney.com/api/qt/clist/get';
    const FIELDS = 'f12,f14,f2,f3,f4,f5,f6,f7,f8,f9,f10,f20,f21,f23,f24,f25,f22,f11,f62,f128,f136,f115,f152,f133,f108,f161,f162,f163,f164,f165,f166,f167,f168,f169,f170,f171,f172,f173,f177,f178,f179,f180,f181,f182,f183,f184,f185,f186,f187,f188,f189,f190,f191,f192,f230,f231,f232,f233,f234,f235,f236,f237,f238,f239,f240,f241,f242,f243,f244,f245,f246,f247,f248,f249,f250,f251,f252,f253,f254,f255,f256,f257,f258,f259,f260,f261,f262,f263,f264,f265,f266,f267,f268,f269,f270,f271,f272,f273,f274,f275,f276,f277,f278,f279,f280,f281,f282,f283,f284,f285,f286,f287,f288,f289,f290,f291,f292,f293,f294,f295,f296,f297,f298,f299,f300,f301,f302,f303,f304,f305,f306,f307,f308,f309,f310,f311,f312,f313,f314,f315,f316,f317,f318,f319,f320,f321,f322,f323,f324,f325,f326,f327,f328,f329,f330,f331,f332,f333,f334,f335,f336,f337,f338,f339,f340,f341,f342,f343,f344,f345,f346,f347,f348,f349,f350,f351,f352,f353,f354,f355,f356,f357,f358,f359,f360,f361,f362,f363,f364,f365,f366,f367,f368,f369,f370,f371,f372,f373,f374,f375,f376,f377,f378,f379,f380,f381,f382,f383,f384,f385,f386,f387,f388,f389,f390,f391,f392,f393,f394,f395,f396,f397,f398,f399,f400';
    const FIELD_MAP = {
        'f12': 'code', 'f14': 'name', 'f2': 'price', 'f3': 'change', 'f4': 'changeAmt',
        'f5': 'volume', 'f6': 'amount', 'f7': 'amplitude', 'f8': 'turnover', 'f9': 'pe',
        'f10': 'pb', 'f20': 'totalMV', 'f21': 'circMV', 'f23': 'roe', 'f22': 'eps',
        'f25': 'bps', 'f11': 'volumeRatio', 'f115': 'peg', 'f162': 'ps', 'f163': 'pcf',
        'f133': 'revenueGrowth', 'f136': 'profitGrowth', 'f100': 'market'
    };
    const PRESETS = {
        custom: { peMin: 0, peMax: 50, pbMax: 3, mvMin: 20, mvMax: 10000, excludeST: true, excludeBJ: true, sortBy: 'score' },
        value: { peMin: 0, peMax: 15, pbMax: 2, mvMin: 100, excludeST: true, excludeBJ: true, sortBy: 'pe' },
        growth: { peMin: 10, peMax: 60, mvMin: 50, excludeST: true, excludeBJ: true, sortBy: 'score' },
        bluechip: { peMin: 0, peMax: 20, pbMax: 2, mvMin: 500, mvMax: 10000, excludeST: true, excludeBJ: true, sortBy: 'mv' },
        smallcap: { peMin: 0, peMax: 80, pbMax: 5, mvMin: 10, mvMax: 200, excludeST: true, excludeBJ: true, sortBy: 'mv' },
        trend: { peMin: 0, peMax: 100, mvMin: 50, excludeST: true, excludeBJ: true, sortBy: 'score' },
        oversold: { peMin: 0, peMax: 50, pbMax: 3, mvMin: 20, excludeST: true, excludeBJ: true, sortBy: 'score' },
        mabullet: { peMin: 0, peMax: 100, mvMin: 50, excludeST: true, excludeBJ: true, sortBy: 'score' },
    };

    let allStocks = [], filteredStocks = [], dataMode = 'frontend', apiConnected = false;

    // ── 初始化 ──
    document.addEventListener('DOMContentLoaded', () => {
        // 设置默认回测日期
        const today = new Date();
        document.getElementById('btEndDate').value = today.toISOString().split('T')[0];
        document.getElementById('btStartDate').value = new Date(today.getFullYear()-1, today.getMonth(), today.getDate()).toISOString().split('T')[0];
        // 检查 API 状态
        checkApiStatus();
        // 加载数据
        if (dataMode === 'frontend') loadData();
    });

    // ── 模式切换 ──
    async function switchMode(mode) {
        dataMode = mode;
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
        document.getElementById('currentModeText').textContent = mode === 'frontend' ? '免费前端 (AkShare)' : '后端 API (iFinD)';
        document.getElementById('techFilterCard').style.opacity = mode === 'backend' ? '1' : '0.6';
        document.getElementById('techFilterCard').style.pointerEvents = mode === 'backend' ? 'auto' : 'none';
        if (mode === 'backend') await checkApiStatus();
    }

    async function checkApiStatus() {
        try {
            const resp = await fetch(API_BASE + '/api/health', { method: 'GET', signal: AbortSignal.timeout(3000) });
            if (resp.ok) {
                apiConnected = true;
                const data = await resp.json();
                document.getElementById('apiStatus').classList.remove('offline');
                document.getElementById('apiStatusText').textContent = 'API 已连接 (' + data.data_source + ')';
                return;
            }
        } catch (e) {}
        apiConnected = false;
        document.getElementById('apiStatus').classList.add('offline');
        document.getElementById('apiStatusText').textContent = 'API 未连接';
    }

    // ── 标签页切换 ──
    function switchTab(tab) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.id === 'panel-' + tab));
        if (tab === 'history' && dataMode === 'backend') loadHistory();
    }

    // ── 加载数据 ──
    async function loadData() {
        if (dataMode === 'backend') return;
        showLoading('正在获取全市场股票数据...', 10);
        try {
            let stocks = [], page = 1, hasMore = true;
            while (hasMore && page <= 3) {
                const params = new URLSearchParams({ pn: page, pz: 500, po: 1, np: 1, ut: 'bd1d9ddb04089700cf9c27f6f7426281', fltt: 2, invt: 2, fid: 'f12', fs: 'm:0+t:6,m:0+t:13,m:0+t:80,m:1+t:2,m:1+t:23,m:0+t:81+s:204', fields: FIELDS, _: Date.now() });
                const resp = await fetch(EASTMONEY_API + '?' + params.toString());
                const data = await resp.json();
                if (data.data && data.data.diff && data.data.diff.length > 0) {
                    stocks.push(...data.data.diff.map(item => parseStock(item)));
                    hasMore = data.data.diff.length >= 500;
                    updateLoadingProgress(page / 3 * 100);
                } else { hasMore = false; }
                page++; await sleep(300);
            }
            allStocks = stocks; hideLoading(); runScreen();
        } catch (e) { console.error(e); hideLoading(); showError('数据获取失败，请刷新页面重试'); }
    }

    function parseStock(raw) {
        const s = {};
        for (const [k, v] of Object.entries(raw)) { if (FIELD_MAP[k]) s[FIELD_MAP[k]] = v; }
        if (s.price) s.price /= 100; if (s.change) s.change /= 100; if (s.changeAmt) s.changeAmt /= 100;
        if (s.turnover) s.turnover /= 100; if (s.amplitude) s.amplitude /= 100;
        if (s.totalMV) s.totalMV /= 1e8; if (s.circMV) s.circMV /= 1e8; if (s.amount) s.amount /= 1e4;
        s.ticker = (s.market === 1 || String(s.code).startsWith('6')) ? s.code + '.SH' : s.code + '.SZ';
        s.score = calculateScore(s);
        return s;
    }

    function calculateScore(s) {
        let score = 50;
        if (s.pe > 0 && s.pe < 100) score += Math.max(0, 20 - s.pe / 5);
        if (s.pb > 0 && s.pb < 20) score += Math.max(0, 15 - s.pb * 2);
        if (s.roe > 0) score += Math.min(25, s.roe / 2);
        if (s.change !== undefined) score += Math.max(0, 10 - Math.abs(s.change) / 2);
        if (s.totalMV > 0) { if (s.totalMV > 50 && s.totalMV < 1000) score += 10; else if (s.totalMV > 20 && s.totalMV < 5000) score += 5; }
        return Math.round(Math.min(100, Math.max(0, score)));
    }

    // ── 执行选股 ──
    async function runScreen() {
        if (dataMode === 'backend') { await runApiScreen(); return; }
        if (allStocks.length === 0) { loadData(); return; }
        showLoading('正在筛选股票...', 50);
        const peMin = parseFloat(document.getElementById('peMin').value) || 0;
        const peMax = parseFloat(document.getElementById('peMax').value) || Infinity;
        const pbMin = parseFloat(document.getElementById('pbMin').value) || 0;
        const pbMax = parseFloat(document.getElementById('pbMax').value) || Infinity;
        const mvMin = parseFloat(document.getElementById('mvMin').value) || 0;
        const mvMax = parseFloat(document.getElementById('mvMax').value) || Infinity;
        const excludeST = document.getElementById('excludeST').checked;
        const excludeBJ = document.getElementById('excludeBJ').checked;
        const excludeKC = document.getElementById('excludeKC').checked;
        const excludeCY = document.getElementById('excludeCY').checked;
        const maxResults = parseInt(document.getElementById('maxResults').value) || 50;

        filteredStocks = allStocks.filter(s => {
            if (excludeST && s.name && (s.name.includes('ST') || s.name.includes('退'))) return false;
            if (excludeBJ && s.code && (s.code.startsWith('8') || s.code.startsWith('4'))) return false;
            if (excludeKC && s.code && s.code.startsWith('688')) return false;
            if (excludeCY && s.code && s.code.startsWith('300')) return false;
            if (s.pe !== undefined && s.pe !== null) { if (s.pe <= 0 || s.pe < peMin || s.pe > peMax) return false; } else if (peMin > 0) return false;
            if (s.pb !== undefined && s.pb !== null) { if (s.pb <= 0 || s.pb < pbMin || s.pb > pbMax) return false; } else if (pbMin > 0) return false;
            if (s.totalMV !== undefined && s.totalMV !== null) { if (s.totalMV < mvMin || s.totalMV > mvMax) return false; }
            return true;
        });

        const sortBy = document.getElementById('sortBy').value;
        const sortKey = { score: 'score', pe: 'pe', pb: 'pb', mv: 'totalMV' }[sortBy] || 'score';
        const asc = sortKey === 'pe' || sortKey === 'pb' || sortKey === 'totalMV';
        filteredStocks.sort((a, b) => { const va = a[sortKey] !== undefined ? a[sortKey] : (asc ? Infinity : -Infinity); const vb = b[sortKey] !== undefined ? b[sortKey] : (asc ? Infinity : -Infinity); return asc ? (va > vb ? 1 : -1) : (va < vb ? 1 : -1); });
        filteredStocks = filteredStocks.slice(0, maxResults);
        hideLoading(); updateStats(); renderTable();
    }

    // ── API 模式选股 ──
    async function runApiScreen() {
        if (!apiConnected) { showError('API 未连接，请先启动 api_server.py'); return; }
        showLoading('正在通过后端 API 选股...', 30);
        try {
            const strategy = document.querySelector('.preset-btn.active')?.dataset.preset || 'custom';
            const payload = {
                strategy: strategy,
                pe_min: parseFloat(document.getElementById('peMin').value) || 0,
                pe_max: parseFloat(document.getElementById('peMax').value) || 0,
                pb_min: parseFloat(document.getElementById('pbMin').value) || null,
                pb_max: parseFloat(document.getElementById('pbMax').value) || null,
                mv_min: parseFloat(document.getElementById('mvMin').value) || null,
                mv_max: parseFloat(document.getElementById('mvMax').value) || null,
                exclude_st: document.getElementById('excludeST').checked,
                exclude_bj: document.getElementById('excludeBJ').checked,
                exclude_kc: document.getElementById('excludeKC').checked,
                exclude_cy: document.getElementById('excludeCY').checked,
                max_results: parseInt(document.getElementById('maxResults').value) || 50,
                sort_by: document.getElementById('sortBy').value,
                use_tech: document.getElementById('maBullish').checked || document.getElementById('macdGolden').checked || document.getElementById('kdjGolden').checked || document.getElementById('bollLower').checked
            };
            const resp = await fetch(API_BASE + '/api/screen', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
            const data = await resp.json();
            if (data.error) { showError('选股失败: ' + data.error); return; }
            filteredStocks = (data.stocks || []).map(s => ({
                code: s.stock_code || s.code || s.ticker,
                name: s.stock_name || s.name,
                price: s.close || s.price,
                change: s.pct_change || s.change || s.pctChange,
                pe: s.pe, pb: s.pb,
                totalMV: s.total_mv || s.totalMV,
                circMV: s.circ_mv || s.circMV,
                turnover: s.turnover,
                score: s.score || 0,
                tech_signals: s.tech_signals || s.techSignals || ''
            }));
            hideLoading(); updateStats(); renderTable();
        } catch (e) { hideLoading(); showError('API 请求失败: ' + e.message); }
    }

    // ── 历史记录 ──
    async function loadHistory() {
        if (!apiConnected) { document.getElementById('historyContainer').innerHTML = '<div class="empty-state"><div class="icon">&#x1F4DC;</div><p>API 未连接</p></div>'; return; }
        try {
            const resp = await fetch(API_BASE + '/api/history?limit=20');
            const data = await resp.json();
            if (!data.records || data.records.length === 0) { document.getElementById('historyContainer').innerHTML = '<div class="empty-state"><div class="icon">&#x1F4DC;</div><p>暂无历史记录</p></div>'; return; }
            let html = '<table class="data-table"><thead><tr><th>ID</th><th>时间</th><th>策略</th><th>选中数</th></tr></thead><tbody>';
            data.records.forEach(r => { html += `<tr><td>${r.id}</td><td>${r.screen_time}</td><td>${r.strategy_name || '自定义'}</td><td>${r.stock_count}</td></tr>`; });
            html += '</tbody></table>';
            document.getElementById('historyContainer').innerHTML = html;
        } catch (e) { document.getElementById('historyContainer').innerHTML = '<div class="empty-state"><div class="icon">&#x26A0;</div><p>加载失败: ' + e.message + '</p></div>'; }
    }

    // ── 回测 ──
    async function runBacktest() {
        if (!apiConnected) { showError('API 未连接，请先启动 api_server.py'); return; }
        showLoading('正在运行回测...', 30);
        try {
            const payload = {
                strategy: document.getElementById('btStrategy').value,
                start_date: document.getElementById('btStartDate').value,
                end_date: document.getElementById('btEndDate').value,
                initial_cash: parseFloat(document.getElementById('btCash').value) * 10000,
                max_position_pct: parseFloat(document.getElementById('btMaxPos').value)
            };
            const resp = await fetch(API_BASE + '/api/backtest', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
            const data = await resp.json();
            if (data.error) { hideLoading(); showError('回测失败: ' + data.error); return; }
            hideLoading();
            let html = '<div class="backtest-result">';
            html += '<h3 style="margin-bottom:16px;">&#x1F4C8; 回测结果</h3>';
            html += '<div class="backtest-metrics">';
            const metrics = [
                { label: '总收益率', value: (data.total_return_pct || 0).toFixed(2) + '%', cls: (data.total_return_pct || 0) >= 0 ? 'positive' : 'negative' },
                { label: '年化收益率', value: (data.annual_return_pct || 0).toFixed(2) + '%', cls: (data.annual_return_pct || 0) >= 0 ? 'positive' : 'negative' },
                { label: '最大回撤', value: (data.max_drawdown_pct || 0).toFixed(2) + '%', cls: '' },
                { label: '夏普比率', value: (data.sharpe_ratio || 0).toFixed(2), cls: '' },
                { label: '交易次数', value: (data.trade_count || 0), cls: '' }
            ];
            metrics.forEach(m => { html += `<div class="backtest-metric ${m.cls}"><div class="value">${m.value}</div><div class="label">${m.label}</div></div>`; });
            html += '</div></div>';
            document.getElementById('backtestResultContainer').innerHTML = html;
        } catch (e) { hideLoading(); showError('回测请求失败: ' + e.message); }
    }

    // ── 预设应用 ──
    function applyPreset(name) {
        document.querySelectorAll('.preset-btn').forEach(b => b.classList.toggle('active', b.dataset.preset === name));
        const p = PRESETS[name] || PRESETS.custom;
        document.getElementById('peMin').value = p.peMin !== undefined ? p.peMin : '';
        document.getElementById('peMax').value = p.peMax !== undefined ? p.peMax : '';
        document.getElementById('pbMin').value = p.pbMin !== undefined ? p.pbMin : '';
        document.getElementById('pbMax').value = p.pbMax !== undefined ? p.pbMax : '';
        document.getElementById('mvMin').value = p.mvMin !== undefined ? p.mvMin : '';
        document.getElementById('mvMax').value = p.mvMax !== undefined ? p.mvMax : '';
        document.getElementById('excludeST').checked = p.excludeST !== undefined ? p.excludeST : true;
        document.getElementById('excludeBJ').checked = p.excludeBJ !== undefined ? p.excludeBJ : true;
        document.getElementById('sortBy').value = p.sortBy || 'score';
    }

    // ── 统计 ──
    function updateStats() {
        const n = filteredStocks.length;
        document.getElementById('statCount').textContent = n;
        if (n === 0) { ['statAvgPE','statAvgPB','statAvgScore','statAvgMV'].forEach(id => document.getElementById(id).textContent = '-'); return; }
        const avg = key => { const vals = filteredStocks.map(s => s[key]).filter(v => v !== undefined && !isNaN(v) && v > 0); return vals.length ? (vals.reduce((a,b) => a+b, 0) / vals.length).toFixed(2) : '-'; };
        document.getElementById('statAvgPE').textContent = avg('pe');
        document.getElementById('statAvgPB').textContent = avg('pb');
        document.getElementById('statAvgScore').textContent = avg('score');
        document.getElementById('statAvgMV').textContent = avg('totalMV');
    }

    // ── 表格渲染 ──
    function renderTable() {
        const container = document.getElementById('tableContainer');
        if (filteredStocks.length === 0) { container.innerHTML = '<div class="empty-state"><div class="icon">&#x1F50D;</div><p>没有符合条件的股票，请放宽筛选条件</p></div>'; return; }
        let html = '<div class="table-toolbar"><span class="count">共 <strong>' + filteredStocks.length + '</strong> 只</span><span style="font-size:12px;color:var(--text-secondary);">点击表头排序</span></div>';
        html += '<table class="data-table"><thead><tr><th onclick="sortByColumn(\'rank\')">排名</th><th onclick="sortByColumn(\'code\')">代码</th><th onclick="sortByColumn(\'name\')">名称</th><th onclick="sortByColumn(\'price\')">最新价</th><th onclick="sortByColumn(\'change\')">涨跌幅</th><th onclick="sortByColumn(\'pe\')">PE</th><th onclick="sortByColumn(\'pb\')">PB</th><th onclick="sortByColumn(\'totalMV\')">总市值(亿)</th><th onclick="sortByColumn(\'turnover\')">换手</th><th onclick="sortByColumn(\'score\')">评分</th><th>评级</th>' + (dataMode === 'backend' ? '<th>技术信号</th>' : '') + '</tr></thead><tbody>';
        filteredStocks.forEach((s, i) => {
            const chgClass = s.change > 0 ? 'positive' : (s.change < 0 ? 'negative' : '');
            const chgSign = s.change > 0 ? '+' : '';
            html += `<tr><td>${i+1}</td><td class="code">${s.code || ''}</td><td class="name">${s.name || ''}</td><td>${s.price !== undefined ? s.price.toFixed(2) : '-'}</td><td class="${chgClass}">${s.change !== undefined ? chgSign + s.change.toFixed(2) + '%' : '-'}</td><td>${s.pe !== undefined && s.pe > 0 ? s.pe.toFixed(1) : '-'}</td><td>${s.pb !== undefined && s.pb > 0 ? s.pb.toFixed(2) : '-'}</td><td>${s.totalMV !== undefined ? s.totalMV.toFixed(2) : '-'}</td><td>${s.turnover !== undefined ? s.turnover.toFixed(2) : '-'}</td><td class="score">${s.score !== undefined ? s.score.toFixed(1) : '-'}</td><td class="rating">${getRating(s.score)}</td>` + (dataMode === 'backend' ? `<td class="tech-signals" title="${s.tech_signals || ''}">${s.tech_signals || '-'}</td>` : '') + `</tr>`;
        });
        html += '</tbody></table>';
        container.innerHTML = html;
    }

    function getRating(score) { if (score >= 85) return '&#x2B50;&#x2B50;&#x2B50;&#x2B50;&#x2B50;'; if (score >= 70) return '&#x2B50;&#x2B50;&#x2B50;&#x2B50;'; if (score >= 55) return '&#x2B50;&#x2B50;&#x2B50;'; if (score >= 40) return '&#x2B50;&#x2B50;'; return '&#x2B50;'; }

    function sortByColumn(key) {
        const sortMap = { rank: 'score', code: 'code', name: 'name', price: 'price', change: 'change', pe: 'pe', pb: 'pb', totalMV: 'totalMV', turnover: 'turnover', score: 'score' };
        const sortKey = sortMap[key] || 'score'; const asc = key === 'pe' || key === 'pb' || key === 'totalMV' || key === 'code';
        filteredStocks.sort((a, b) => { const va = a[sortKey] !== undefined ? a[sortKey] : (asc ? Infinity : -Infinity); const vb = b[sortKey] !== undefined ? b[sortKey] : (asc ? Infinity : -Infinity); return asc ? (va > vb ? 1 : -1) : (va < vb ? 1 : -1); });
        renderTable();
    }

    // ── 导出 CSV ──
    function exportCSV() {
        if (filteredStocks.length === 0) { alert('没有数据可导出'); return; }
        const headers = ['排名','代码','名称','最新价','涨跌幅','PE','PB','总市值(亿)','换手率','评分','评级'];
        const rows = filteredStocks.map((s, i) => [i+1, s.code||'', s.name||'', s.price!==undefined?s.price.toFixed(2):'', s.change!==undefined?s.change.toFixed(2):'', s.pe!==undefined&&s.pe>0?s.pe.toFixed(1):'', s.pb!==undefined&&s.pb>0?s.pb.toFixed(2):'', s.totalMV!==undefined?s.totalMV.toFixed(2):'', s.turnover!==undefined?s.turnover.toFixed(2):'', s.score||'', getRating(s.score)]);
        const csv = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
        const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a'); link.href = URL.createObjectURL(blob); link.download = '选股结果_' + new Date().toLocaleDateString() + '.csv'; link.click();
    }

    // ── 重置 ──
    function resetFilters() { applyPreset('custom'); document.getElementById('maxResults').value = '50'; document.getElementById('sortBy').value = 'score'; runScreen(); }

    // ── 工具函数 ──
    function showLoading(text, progress) { document.getElementById('loadingText').textContent = text; document.getElementById('loadingBar').style.width = progress + '%'; document.getElementById('loadingOverlay').classList.add('active'); }
    function updateLoadingProgress(pct) { document.getElementById('loadingBar').style.width = pct + '%'; }
    function hideLoading() { document.getElementById('loadingOverlay').classList.remove('active'); }
    function showError(msg) { document.getElementById('tableContainer').innerHTML = '<div class="empty-state"><div class="icon">&#x26A0;</div><p>' + msg + '</p></div>'; }
    function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
    </script>
</body>
